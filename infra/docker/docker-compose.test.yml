services:
  postgres-test:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meritview_test
    ports: ["5433:5432"]
    tmpfs: ["/var/lib/postgresql/data"]

  redis-test:
    image: redis:7.4-alpine
    ports: ["6380:6379"]
    tmpfs: ["/data"]
