services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meritview
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meritview]

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [meritview]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports: ["1025:1025", "8025:8025"]
    networks: [meritview]

  adminer:
    image: adminer:4.8.1
    ports: ["8080:8080"]
    depends_on: [postgres]
    networks: [meritview]

volumes:
  postgres_data:
  redis_data:

networks:
  meritview:
    driver: bridge
