services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meritview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mock-llm:
    build:
      context: .
      dockerfile: infra/mock-llm.Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./infra/mock-llm-db.json:/app/db.json

  server:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/meritview
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    volumes:
      - ./server/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter ./server dev

  client:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
    depends_on:
      - server
    command: pnpm --filter ./client dev

volumes:
  postgres_data:
  redis_data:
